<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}服装进销存{% endblock %}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            min-height: 100vh;
        }
        .nav {
            background: #111;
            border-bottom: 1px solid #2a2a2a;
            padding: 0 20px;
            display: flex;
            align-items: center;
            height: 56px;
            gap: 24px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .nav-brand { font-size: 18px; font-weight: 700; color: #f59e0b; letter-spacing: 1px; }
        .nav a {
            color: #999;
            text-decoration: none;
            font-size: 14px;
            padding: 4px 12px;
            border-radius: 6px;
            transition: .2s;
        }
        .nav a:hover { color: #fff; background: #222; }
        .nav a.active { color: #f59e0b; background: #1a1a1a; }
        .container { max-width: 1200px; margin: 0 auto; padding: 24px 20px; }
        .flash {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 14px;
        }
        .flash.success { background: #0d3320; color: #6ee7b7; border: 1px solid #1a4a33; }
        .flash.error { background: #3d0d0d; color: #fca5a5; border: 1px solid #5a1a1a; }
        .flash.warning { background: #3d2e0d; color: #fcd34d; border: 1px solid #5a401a; }
        .btn {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 8px 18px; border-radius: 8px; border: none;
            font-size: 14px; font-weight: 600; cursor: pointer;
            text-decoration: none; transition: .2s;
        }
        .btn-primary { background: #f59e0b; color: #000; }
        .btn-primary:hover { background: #d97706; }
        .btn-success { background: #059669; color: #fff; }
        .btn-success:hover { background: #047857; }
        .btn-danger { background: #dc2626; color: #fff; }
        .btn-danger:hover { background: #b91c1c; }
        .btn-outline { background: transparent; color: #999; border: 1px solid #333; }
        .btn-outline:hover { color: #fff; border-color: #666; }
        .btn-sm { padding: 4px 12px; font-size: 12px; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th { text-align: left; padding: 10px 12px; color: #888; font-weight: 600;
             border-bottom: 1px solid #2a2a2a; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
        td { padding: 10px 12px; border-bottom: 1px solid #1a1a1a; }
        tr:hover td { background: #111; }
        .card {
            background: #111;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .card-title { font-size: 16px; font-weight: 700; margin-bottom: 16px; color: #f59e0b; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
        .stat-card { background: #111; border: 1px solid #2a2a2a; border-radius: 10px; padding: 16px; }
        .stat-card .label { color: #666; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
        .stat-card .value { font-size: 28px; font-weight: 700; margin-top: 4px; }
        .tag {
            display: inline-block; padding: 2px 8px; border-radius: 4px;
            font-size: 12px; font-weight: 600;
        }
        .tag-green { background: #0d3320; color: #6ee7b7; }
        .tag-yellow { background: #3d2e0d; color: #fcd34d; }
        .tag-red { background: #3d0d0d; color: #fca5a5; }
        form label { display: block; color: #999; font-size: 13px; margin-bottom: 4px; }
        form input, form select, form textarea {
            width: 100%; padding: 10px 12px; border-radius: 8px; border: 1px solid #333;
            background: #1a1a1a; color: #e0e0e0; font-size: 14px; margin-bottom: 16px;
        }
        form input:focus, form select:focus { outline: none; border-color: #f59e0b; }
        form textarea { resize: vertical; min-height: 60px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .inline-flex { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        .badge { background: #f59e0b; color: #000; padding: 2px 8px; border-radius: 10px; font-size: 12px; font-weight: 700; }
        .page-title { font-size: 22px; font-weight: 700; margin-bottom: 20px; }
        .text-muted { color: #666; font-size: 13px; }
        .text-right { text-align: right; }
        .mt-16 { margin-top: 16px; }
        .mb-16 { margin-bottom: 16px; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; }
        @media (max-width: 768px) {
            .form-row { grid-template-columns: 1fr; }
            .nav { gap: 12px; overflow-x: auto; }
            .nav a { white-space: nowrap; }
        }
    </style>
</head>
<body>
    <nav class="nav">
        <span class="nav-brand">👔 进销存</span>
        <a href="{{ url_for('index') }}" class="{% if request.path=='/' %}active{% endif %}">库存总览</a>
        <a href="{{ url_for('add_product') }}" class="{% if 'product/add' in request.path %}active{% endif %}">添加款号</a>
        <a href="{{ url_for('stock_in') }}" class="{% if 'stock/in' in request.path %}active{% endif %}">进货</a>
        <a href="{{ url_for('stock_out') }}" class="{% if 'stock/out' in request.path %}active{% endif %}">出货</a>
        <a href="{{ url_for('stock_return') }}" class="{% if 'stock/return' in request.path %}active{% endif %}">退货</a>
        <a href="{{ url_for('report') }}" class="{% if 'report' in request.path %}active{% endif %}">流水</a>
    </nav>
    <div class="container">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, msg in messages %}
                    <div class="flash {{ category }}">{{ msg }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        {% block content %}{% endblock %}
    </div>
</body>
</html>

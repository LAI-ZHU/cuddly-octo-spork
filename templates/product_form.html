{% extends "base.html" %}
{% block page_title %}{% if product %}编辑商品{% else %}新建商品{% endif %}{% endblock %}
{% block toolbar %}<a href="{{ url_for('product_list') }}" class="btn btn-outline btn-sm">← 返回</a>{% endblock %}
{% block content %}
<div class="card" style="max-width:500px;">
<form method="POST">
    <div class="form-row">
        <div><label>款号 *</label><input type="text" name="style_no" required value="{{ product.style_no if product else '' }}" placeholder="如 YR-001"></div>
        <div><label>款名</label><input type="text" name="name" value="{{ product.name if product else '' }}" placeholder="如 柠檬黄羽绒服"></div>
    </div>
    <div class="form-row">
        <div><label>颜色</label><input type="text" name="color" value="{{ product.color if product else '' }}" placeholder="如 柠檬黄"></div>
        <div><label>分类</label>
            <select name="category_id">
                <option value="">- 选择 -</option>
                {% for c in categories %}<option value="{{ c.id }}" {% if product and product.category_id==c.id %}selected{% endif %}>{{ c.name }}</option>{% endfor %}
            </select>
        </div>
    </div>
    <div class="form-row">
        <div><label>进货价</label><input type="number" step="0.01" name="cost_price" value="{{ product.cost_price if product and product.cost_price>0 else '' }}" placeholder="0"></div>
        <div><label>零售价</label><input type="number" step="0.01" name="retail_price" value="{{ product.retail_price if product and product.retail_price>0 else '' }}" placeholder="0"></div>
    </div>

    <label style="margin-top:8px;">尺码规格 <span class="text-muted">(勾选即可)</span></label>
    <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;">
        {% for s in sizes %}
        <label style="display:flex;align-items:center;gap:4px;padding:4px 12px;border-radius:16px;border:1px solid #333;font-size:13px;cursor:pointer;background:{% if product and s in stock_map %}#222{% else %}transparent{% endif %};"
               onclick="this.querySelector('input').checked=!this.querySelector('input').checked;this.style.background=this.querySelector('input').checked?'#f59e0b':'';this.style.color=this.querySelector('input').checked?'#000':'#999'">
            <input type="checkbox" name="sizes[]" value="{{ s }}" 
                {% if product and (s in psizes or s in stock_map) %}checked{% endif %}
                style="display:none;">
            {{ s }}
        </label>
        {% endfor %}
    </div>

    <div style="display:none;">
        <div class="form-row">
            <div><label>条码</label><input type="text" name="barcode" value="{{ product.barcode if product else '' }}"></div>
            <div><label>品牌</label>
                <select name="brand_id">
                    <option value="">- 选择 -</option>
                    {% for b in brands %}<option value="{{ b.id }}" {% if product and product.brand_id==b.id %}selected{% endif %}>{{ b.name }}</option>{% endfor %}
                </select>
            </div>
        </div>
        <div><label>备注</label><textarea name="description" rows="2">{{ product.description if product else '' }}</textarea></div>
        {% if product %}
        <div><label>状态</label>
            <select name="status">
                <option value="上架" {% if product.status=='上架' %}selected{% endif %}>上架</option>
                <option value="下架" {% if product.status=='下架' %}selected{% endif %}>下架</option>
            </select>
        </div>
        {% endif %}
    </div>
    <details style="margin-bottom:12px;color:#666;font-size:12px;cursor:pointer;">
        <summary>更多设置（品牌/条码/备注）</summary>
        <div class="form-row" style="margin-top:8px;">
            <div><label>条码</label><input type="text" name="barcode" value="{{ product.barcode if product else '' }}"></div>
            <div><label>品牌</label>
                <select name="brand_id">
                    <option value="">- 选择 -</option>
                    {% for b in brands %}<option value="{{ b.id }}" {% if product and product.brand_id==b.id %}selected{% endif %}>{{ b.name }}</option>{% endfor %}
                </select>
            </div>
        </div>
        <div><label>备注</label><textarea name="description" rows="2">{{ product.description if product else '' }}</textarea></div>
        {% if product %}
        <div><label>状态</label>
            <select name="status">
                <option value="上架" {% if product.status=='上架' %}selected{% endif %}>在售</option>
                <option value="下架" {% if product.status=='下架' %}selected{% endif %}>下架</option>
            </select>
        </div>
        {% endif %}
    </details>

    <button type="submit" class="btn btn-primary">✓ {% if product %}保存{% else %}添加商品{% endif %}</button>
    <a href="{{ url_for('product_list') }}" class="btn btn-outline">取消</a>
</form>
</div>
{% endblock %}

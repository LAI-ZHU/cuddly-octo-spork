{% extends "base.html" %}
{% block page_title %}{% if product %}编辑商品{% else %}新建商品{% endif %}{% endblock %}
{% block toolbar %}<a href="{{ url_for('product_list') }}" class="btn btn-outline btn-sm">← 返回</a>{% endblock %}
{% block content %}
<div class="card" style="max-width:550px;">
<form method="POST">
    <div class="form-row">
        <div><label>商品类型</label>
            <div class="flex" style="gap:8px;">
                <label style="display:flex;align-items:center;gap:4px;padding:6px 16px;border-radius:6px;border:1px solid #333;cursor:pointer;background:{% if product and product.product_type=='原材料' %}#f59e0b;color:#000{% elif not product %}#f59e0b;color:#000{% else %}#1a1a1a;color:#999{% endif %};"
                       onclick="toggleType('原材料',this)">
                    <input type="radio" name="product_type" value="原材料" onchange="toggleType(this.value)" {% if product and product.product_type=='原材料' %}checked{% elif not product %}checked{% endif %} style="display:none;"> 🧵 原材料
                </label>
                <label style="display:flex;align-items:center;gap:4px;padding:6px 16px;border-radius:6px;border:1px solid #333;cursor:pointer;background:{% if product and product.product_type=='成品' %}#f59e0b;color:#000{% else %}#1a1a1a;color:#999{% endif %};"
                       onclick="toggleType('成品',this)">
                    <input type="radio" name="product_type" value="成品" onchange="toggleType(this.value)" {% if product and product.product_type=='成品' %}checked{% elif not product %}{% endif %} style="display:none;"> 👕 成品
                </label>
            </div>
        </div>
        <div><label>单位</label>
            <select name="unit" style="width:100%;">
                {% for u in units %}<option value="{{ u }}" {% if product and product.unit==u %}selected{% endif %}>{{ u }}</option>{% endfor %}
            </select>
        </div>
    </div>
    <div class="form-row">
        <div><label>款号 / 编号 *</label><input type="text" name="style_no" required value="{{ product.style_no if product else '' }}" placeholder="如 YL-001 (原材料) 或 YR-001 (成品)"></div>
        <div><label>名称</label><input type="text" name="name" value="{{ product.name if product else '' }}" placeholder="如 涤纶面料 / 柠檬黄羽绒服"></div>
    </div>
    <div class="form-row">
        <div><label>分类</label>
            <select name="category_id">
                <option value="">- 选择 -</option>
                {% for c in categories %}<option value="{{ c.id }}" {% if product and product.category_id==c.id %}selected{% endif %}>{{ c.name }}</option>{% endfor %}
            </select>
        </div>
        <div id="colorField" style="{% if product and product.product_type=='原材料' %}display:none{% endif %};">
            <label>颜色</label>
            <input type="text" name="color" value="{{ product.color if product else '' }}" placeholder="成品颜色">
        </div>
    </div>
    <div class="form-row">
        <div><label>进货价</label><input type="number" step="0.01" name="cost_price" value="{{ product.cost_price if product and product.cost_price>0 else '' }}" placeholder="0"></div>
        <div><label>批发价</label><input type="number" step="0.01" name="wholesale_price" value="{{ product.wholesale_price if product and product.wholesale_price>0 else '' }}" placeholder="0"></div>
    </div>

    {# 尺码（仅成品） #}
    <div id="sizeFields" {% if product and product.product_type=='原材料' %}style="display:none"{% endif %}>
        <label>尺码规格 <span class="text-muted">(成品勾选即可)</span></label>
        <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;">
            {% for s in sizes %}
            <label style="display:flex;align-items:center;gap:4px;padding:4px 12px;border-radius:16px;border:1px solid #333;font-size:13px;cursor:pointer;background:{% if product and (s in psizes or s in stock_map) %}#222{% else %}transparent{% endif %};"
                   onclick="this.querySelector('input').checked=!this.querySelector('input').checked;this.style.background=this.querySelector('input').checked?'#f59e0b':'';this.style.color=this.querySelector('input').checked?'#000':'#999'">
                <input type="checkbox" name="sizes[]" value="{{ s }}" 
                    {% if product and (s in psizes or s in stock_map) %}checked{% endif %}
                    style="display:none;">
                {{ s }}
            </label>
            {% endfor %}
        </div>
    </div>

    <details style="margin-bottom:12px;color:#666;font-size:12px;cursor:pointer;">
        <summary>更多设置（条码/备注/状态）</summary>
        <div style="margin-top:8px;">
            <div class="form-row">
                <div><label>条码</label><input type="text" name="barcode" value="{{ product.barcode if product else '' }}"></div>
                <div><label>品牌</label><select name="brand_id"><option value="">- 选择 -</option>{% for b in brands %}<option value="{{ b.id }}" {% if product and product.brand_id==b.id %}selected{% endif %}>{{ b.name }}</option>{% endfor %}</select></div>
            </div>
            <div><label>备注</label><textarea name="description" rows="2">{{ product.description if product else '' }}</textarea></div>
            {% if product %}
            <div><label>状态</label><select name="status"><option value="上架" {% if product.status=='上架' %}selected{% endif %}>在售</option><option value="下架" {% if product.status=='下架' %}selected{% endif %}>下架</option></select></div>
            {% endif %}
        </div>
    </details>

    <button type="submit" class="btn btn-primary">✓ {% if product %}保存{% else %}添加商品{% endif %}</button>
    <a href="{{ url_for('product_list') }}" class="btn btn-outline">取消</a>
</form>
</div>
<script>
function toggleType(val, el){
    var colorF = document.getElementById('colorField');
    var sizeF = document.getElementById('sizeFields');
    if(val === '原材料'){
        colorF.style.display = 'none';
        sizeF.style.display = 'none';
    } else {
        colorF.style.display = '';
        sizeF.style.display = '';
    }
    // Update pill style
    document.querySelectorAll('input[name="product_type"]').forEach(function(r){
        var p = r.closest('label') || r.parentElement;
        if(r.value === val){
            p.style.background = '#f59e0b';
            p.style.color = '#000';
        } else {
            p.style.background = '#1a1a1a';
            p.style.color = '#999';
        }
    });
}
</script>
{% endblock %}
